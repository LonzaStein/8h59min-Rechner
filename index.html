<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feierabend Rechner</title>

<meta name="theme-color" content="#667eea">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
  width: 380px;
}

h2 {
  margin-bottom: 25px;
  color: #333;
}

.input-group {
  position: relative;
  margin-bottom: 15px;
}

.input-group input {
  width:100%;
  padding:14px 12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
}

.input-group label {
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#777;
  font-size:14px;
  transition:0.3s;
  background:white;
  padding:0 5px;
}

.input-group input:focus + label,
.input-group input:valid + label {
  top:-8px;
  font-size:12px;
  color:#667eea;
}

button {
  width:100%;
  background:#667eea;
  color:white;
  border:none;
  padding:14px;
  font-size:14px;
  border-radius:12px;
  cursor:pointer;
  margin-top:8px;
}

.pause-group {
  border:1px solid #ccc;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  position:relative;
}

.remove-btn {
  position:absolute;
  top:8px;
  right:8px;
  background:#e11d48;
  color:white;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
  font-weight:bold;
}

#status {
  margin-top:20px;
  text-align:left;
  font-size:15px;
}

#minZeit {
  color:#16a34a;
  font-weight:bold;
}

#maxZeit {
  color:#dc2626;
  font-weight:bold;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>⏰ Feierabend Rechner</h2>

  <div class="input-group">
    <input type="time" id="startzeit" required>
    <label>Startzeit</label>
  </div>

  <div id="pausenContainer"></div>

  <button id="addPauseBtn">Weitere Pause hinzufügen</button>

  <div id="status">
    <p id="minZeit"></p>
    <p id="maxZeit"></p>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
let pauseCount = 0;
const maxPauses = 4;
const pausenContainer = document.getElementById("pausenContainer");
const addPauseBtn = document.getElementById("addPauseBtn");

document.getElementById("startzeit")
  .addEventListener("change", updateStatus);

// ---- Pause hinzufügen ----
function createPauseGroup() {
  if (pauseCount >= maxPauses) {
    alert("Maximal 4 Pausen möglich");
    return;
  }

  pauseCount++;
  const div = document.createElement("div");
  div.classList.add("pause-group");

  div.innerHTML = `
    <div class="input-group">
      <input type="time" class="pauseStart" required>
      <label>Pausenbeginn ${pauseCount}</label>
    </div>

    <div class="input-group">
      <input type="time" class="pauseEnd" required>
      <label>Pausenende ${pauseCount}</label>
    </div>

    <button class="remove-btn">−</button>
  `;

  div.querySelectorAll("input").forEach(inp =>
    inp.addEventListener("change", updateStatus)
  );

  div.querySelector(".remove-btn").addEventListener("click", () => {
    div.remove();
    pauseCount--;
    updateStatus();
  });

  pausenContainer.appendChild(div);
}

addPauseBtn.addEventListener("click", createPauseGroup);

// ---- Kernlogik ----
function berechneZeitpunkt(arbeitsMinutenZiel) {
  const start = document.getElementById("startzeit").value;
  if (!start) return null;

  const [sh, sm] = start.split(":").map(Number);
  let currentTime = new Date(0,0,0,sh,sm);
  let rest = arbeitsMinutenZiel;

  const pauseGroups = Array.from(
    pausenContainer.getElementsByClassName("pause-group")
  );

  for (let pg of pauseGroups) {
    const ps = pg.querySelector(".pauseStart").value;
    const pe = pg.querySelector(".pauseEnd").value;
    if (!ps || !pe) return null;

    const [ph, pm] = ps.split(":").map(Number);
    const [eh, em] = pe.split(":").map(Number);
    const pStart = new Date(0,0,0,ph,pm);
    const pEnd   = new Date(0,0,0,eh,em);

    const workBeforePause = (pStart - currentTime) / 60000;

    if (rest <= workBeforePause) {
      return new Date(currentTime.getTime() + rest * 60000);
    }

    rest -= workBeforePause;
    currentTime = pEnd;
  }

  return new Date(currentTime.getTime() + rest * 60000);
}

// ---- Status automatisch aktualisieren ----
function updateStatus() {
  const minZeit = berechneZeitpunkt(492);
  const maxZeit = berechneZeitpunkt(539);

  const minEl = document.getElementById("minZeit");
  const maxEl = document.getElementById("maxZeit");

  if (!minZeit || !maxZeit) {
    minEl.textContent = "";
    maxEl.textContent = "";
    return;
  }

  const f = n => n.toString().padStart(2,"0");

  minEl.textContent =
    `✅ Mindestarbeitszeit ab ${f(minZeit.getHours())}:${f(minZeit.getMinutes())}`;

  maxEl.textContent =
    `⏰ Spätester Zeitpunkt ohne Zusatzpause: ${f(maxZeit.getHours())}:${f(maxZeit.getMinutes())}`;
}

// ---- Confetti (optional) ----
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);
</script>

</body>
</html>
