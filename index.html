<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feierabend Rechner</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card {
  background:#fff;
  padding:28px;
  border-radius:16px;
  width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}
h2 { text-align:center; margin-bottom:16px; }
.input-group { margin-bottom:12px; }
input[type=time] {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}
.pause-group {
  border:1px solid #ccc;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
.remove-btn {
  float:right;
  background:#dc2626;
  color:white;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
}
button {
  width:100%;
  padding:12px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:10px;
  margin-top:8px;
}
#status { margin-top:14px; font-size:14px; }
.ok { color:#16a34a; font-weight:bold; }
.warn { color:#dc2626; font-weight:bold; }
.info { color:#2563eb; font-weight:bold; }
</style>
</head>

<body>
<div class="card">
<h2>⏰ Feierabend‑ & Pausenrechner</h2>

<label>
  <input type="radio" name="mode" value="short" checked>
  Feierabend &lt; 6h (keine Pause)
</label><br>
<label>
  <input type="radio" name="mode" value="regular">
  Regelarbeitszeit 8h12
</label>

<div class="input-group">
  <input type="time" id="startzeit">
</div>

<div id="pausen"></div>
<button onclick="addPause()">Pause hinzufügen</button>

<div id="status"></div>
</div>

<script>
const WORK_6H = 360;
const WORK_9H = 540;

function addPause() {
  const d = document.createElement("div");
  d.className = "pause-group";
  d.innerHTML = `
    <input type="time" class="ps"> –
    <input type="time" class="pe">
    <button class="remove-btn">−</button>
  `;
  d.querySelector(".remove-btn").onclick = () => { d.remove(); update(); };
  d.querySelectorAll("input").forEach(i => i.onchange = update);
  document.getElementById("pausen").appendChild(d);
}

document.querySelectorAll("input").forEach(i => i.onchange = update);

function minutes(t) {
  const [h,m] = t.split(":").map(Number);
  return h * 60 + m;
}
function fmt(m) {
  return String(Math.floor(m / 60)).padStart(2,"0") + ":" +
         String(m % 60).padStart(2,"0");
}

function update() {
  const start = document.getElementById("startzeit").value;
  if (!start) return;

  const mode = document.querySelector("input[name=mode]:checked").value;
  const startMin = minutes(start);

  let work = 0;
  let pause = 0;
  let last = startMin;

  document.querySelectorAll(".pause-group").forEach(p => {
    const ps = p.querySelector(".ps").value;
    const pe = p.querySelector(".pe").value;
    if (ps && pe) {
      const a = minutes(ps);
      const b = minutes(pe);
      work += a - last;
      pause += b - a;
      last = b;
    }
  });

  let out = [];

  /* -------- MODE < 6h -------- */
  if (mode === "short") {
    const feierabend = startMin + 359 + pause;
    out.push(`<span class="ok">✅ Feierabend ab ${fmt(feierabend)} (keine Pause nötig)</span>`);
  }

  /* -------- MODE 8h12 -------- */
  if (mode === "regular") {
    const arbeitsEnde = startMin + 492;
    out.push(`<span class="info">🕒 8h12 Arbeitszeit erreicht um ${fmt(arbeitsEnde)}</span>`);

    /* erforderliche Mindestpause */
    let requiredPause = 0;
    if (492 > WORK_6H) requiredPause = 30;
    if (492 > WORK_9H) requiredPause = 60;

    const effektivePause = Math.max(pause, requiredPause);
    const legalFeierabend = startMin + 492 + effektivePause;

    if (pause < requiredPause) {
      out.push(
        `<span class="warn">⚠️ Pflichtpause ${requiredPause} min →
        frühester legaler Feierabend ${fmt(legalFeierabend)}</span>`
      );
    } else {
      out.push(`<span class="ok">✅ Pflichtpause erfüllt</span>`);
      out.push(`<span class="ok">✅ Feierabend ab ${fmt(legalFeierabend)}</span>`);
    }

    const nineHWorkTime = startMin + WORK_9H + pause;
    out.push(
      `<span class="warn">⏰ Bis ${fmt(nineHWorkTime)} reicht 30 min Pause.
      Ab danach wären 60 min Pause nötig, falls weiter gearbeitet wird.</span>`
    );
  }

  document.getElementById("status").innerHTML = out.join("<br>");
}
</script>
</body>
</html>
