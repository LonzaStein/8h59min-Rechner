<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feierabend- & Pausenrechner</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  background:white;
  padding:32px;
  border-radius:20px;
  width:480px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2 { text-align:center; margin-bottom:18px; }

input[type=time] {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#667eea;
  border:none;
  border-radius:12px;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

.pause-group {
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
  position:relative;
}

.remove-btn {
  position:absolute;
  right:8px;
  top:8px;
  background:#dc2626;
  color:white;
  border:none;
  width:22px;
  height:22px;
  border-radius:50%;
  cursor:pointer;
}

#status { margin-top:18px; line-height:1.6; }

.ok { color:#16a34a; font-weight:bold; }
.warn { color:#dc2626; font-weight:bold; }
.info { color:#2563eb; font-weight:bold; }

.main-time {
  font-size:20px;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>
<div class="card">
<h2>⏰ Feierabend-Rechner</h2>

<input type="time" id="startzeit">

<div id="pausenContainer"></div>
<button id="addPause">Pause hinzufügen</button>

<label style="display:block; margin-top:12px;">
  <input type="checkbox" id="notifToggle"> Erinnerungen aktivieren
</label>
<button id="enableNotif">🔔 Aktivieren</button>

<div id="status"></div>
</div>

<script>
// ===== KONSTANTEN =====
const TARGET_5H58 = 358;
const TARGET_8H12 = 492;
const TARGET_8H58 = 538;
const REQUIRED_PAUSE = 30;
const MAX_WORK = 600;

// ===== HILFSFUNKTIONEN =====
function toMin(t){
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}
function fmt(m){
  return String(Math.floor(m/60)%24).padStart(2,"0")+":"+
         String(m%60).padStart(2,"0");
}

// ===== PAUSEN =====
const pc = document.getElementById("pausenContainer");

document.getElementById("addPause").onclick = () => {
  const d=document.createElement("div");
  d.className="pause-group";
  d.innerHTML=`
    <input type="time" class="ps"> –
    <input type="time" class="pe">
    <button class="remove-btn">−</button>
  `;
  d.querySelector(".remove-btn").onclick=()=>{d.remove();update()};
  d.querySelectorAll("input").forEach(i=>i.onchange=update);
  pc.appendChild(d);
};

document.querySelectorAll("input").forEach(i=>i.onchange=update);

// ===== NOTIFICATIONS =====
let notificationsEnabled = false;
let timers = [];

function notify(title, body){
  if (!notificationsEnabled) return;
  new Notification(title,{body});
}

function clearTimers(){
  timers.forEach(t => clearTimeout(t));
  timers=[];
}

function scheduleNotifications(start, pause, effectivePause){
  clearTimers();

  const events = [
    { name:"5h58", time:start + TARGET_5H58 + pause },
    { name:"8h12", time:start + TARGET_8H12 + effectivePause },
    { name:"8h58", time:start + TARGET_8H58 + effectivePause },
    { name:"10h",  time:start + MAX_WORK + effectivePause }
  ];

  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  events.forEach(ev=>{
    const trigger = ev.time - 5;
    if(trigger > nowMin){
      const delay = (trigger - nowMin)*60000;
      const t=setTimeout(()=>{
        notify("Erinnerung", `${ev.name} in 5 Minuten`);
      },delay);
      timers.push(t);
    }
  });
}

document.getElementById("enableNotif").onclick = async () => {
  if(!document.getElementById("notifToggle").checked){
    alert("Bitte zuerst Checkbox aktivieren");
    return;
  }

  const perm = await Notification.requestPermission();
  if(perm==="granted"){
    notificationsEnabled=true;
    update();
  }
};

// ===== HAUPTLOGIK =====
function update(){
  const s=document.getElementById("startzeit").value;
  if(!s) return;

  const start=toMin(s);
  let work=0, pause=0, last=start;

  document.querySelectorAll(".pause-group").forEach(p=>{
    const ps=p.querySelector(".ps").value;
    const pe=p.querySelector(".pe").value;
    if(ps && pe){
      const a=toMin(ps), b=toMin(pe);
      work+=a-last;
      pause+=b-a;
      last=b;
    }
  });

  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  let currentWork = work;
  if(nowMin > last){
    currentWork += (nowMin - last);
  }

  let effectivePause = pause===0 ? REQUIRED_PAUSE : pause;

  // ===== HAUPTENTSCHEIDUNG =====
  let primaryEnd = effectivePause>=30
    ? start + TARGET_8H12 + effectivePause
    : start + TARGET_8H58 + effectivePause;

  let out=[];

  out.push(`<div class="main-time">🟢 Feierabend: ${fmt(primaryEnd)}</div>`);

  // ===== STATUS =====
  out.push(`<div class="info">
    Arbeitszeit: ${Math.floor(currentWork/60)}h ${currentWork%60}min<br>
    Pause: ${pause || 30} min<br>
    ${currentWork>MAX_WORK
      ? "⚠️ Genehmigung nötig (>10h)"
      : "✅ im Rahmen"}
  </div>`);

  // ===== DETAILS =====
  out.push(`<details style="margin-top:10px;">
    <summary>Details</summary>
    5h58: ${fmt(start + TARGET_5H58 + pause)}<br>
    8h12: ${fmt(start + TARGET_8H12 + effectivePause)}<br>
    8h58: ${fmt(start + TARGET_8H58 + effectivePause)}<br>
    10h: ${fmt(start + MAX_WORK + effectivePause)}
  </details>`);

  document.getElementById("status").innerHTML=out.join("");

  // ===== NOTIFICATIONS =====
  if(notificationsEnabled){
    scheduleNotifications(start, pause, effectivePause);
  }
}
</script>

</body>
</html>
