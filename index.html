<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feierabend-Rechner</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  background:white;
  padding:32px;
  border-radius:20px;
  width:480px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2 { text-align:center; margin-bottom:18px; }

input[type=time] {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#667eea;
  border:none;
  border-radius:12px;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

.pause-group {
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
  position:relative;
}

.remove-btn {
  position:absolute;
  right:8px;
  top:8px;
  background:#dc2626;
  color:white;
  border:none;
  width:22px;
  height:22px;
  border-radius:50%;
  cursor:pointer;
}

#status { margin-top:18px; line-height:1.6; }

.ok { color:#16a34a; font-weight:bold; }
.warn { color:#dc2626; font-weight:bold; }
.info { color:#2563eb; font-weight:bold; }

.main {
  font-size:20px;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="card">
<h2>⏰ Feierabend-Rechner</h2>

<input type="time" id="startzeit">

<div id="pausenContainer"></div>
<button id="addPause">Pause hinzufügen</button>

<button onclick="debugNotificationState()">🔍 Notification Debug</button>

<div id="status"></div>
</div>

<script>

// ===== KONSTANTEN =====
const TARGET_5H58 = 358;
const TARGET_8H12 = 492;
const TARGET_8H58 = 538;
const TEN_HOURS = 600;

// ===== HELPERS =====
function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function fmt(m){
  return String(Math.floor(m/60)%24).padStart(2,"0")+":"+
         String(m%60).padStart(2,"0");
}

// ===== PAUSEN =====
const pc=document.getElementById("pausenContainer");

document.getElementById("addPause").onclick=()=>{
  const d=document.createElement("div");
  d.className="pause-group";
  d.innerHTML=`
    <input type="time" class="ps"> –
    <input type="time" class="pe">
    <button class="remove-btn">−</button>
  `;
  d.querySelector(".remove-btn").onclick=()=>{d.remove();update()};
  d.querySelectorAll("input").forEach(i=>i.onchange=update);
  pc.appendChild(d);
};

document.querySelectorAll("input").forEach(i=>i.onchange=update);

// ===== NOTIFICATIONS =====
let notificationsEnabled=false;
let timers=[];

function notify(t,b){
  if(notificationsEnabled) new Notification(t,{body:b});
}

function clearTimers(){
  timers.forEach(t=>clearTimeout(t));
  timers=[];
}

// ===== DEBUG =====
function debugNotificationState(){
  alert("Notification permission: " + Notification.permission);
}

// ===== MAIN =====
function update(){

  const s=document.getElementById("startzeit").value;
  if(!s) return;

  const start=toMin(s);

  let work=0,pause=0,last=start;

  document.querySelectorAll(".pause-group").forEach(p=>{
    const ps=p.querySelector(".ps").value;
    const pe=p.querySelector(".pe").value;

    if(ps && pe){
      const a=toMin(ps),b=toMin(pe);
      work+=a-last;
      pause+=b-a;
      last=b;
    }
  });

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  let currentWork=work;
  if(nowMin>last) currentWork+=nowMin-last;

  // ===== MINDESTPAUSE =====
  let requiredPause;

  if(currentWork>=600) requiredPause=60;
  else if(currentWork>=540) requiredPause=45;
  else if(currentWork>=360) requiredPause=30;
  else requiredPause=0;

  let effectivePause = pause===0 ? requiredPause : Math.max(pause,requiredPause);

  // ===== 10H LOGIK (KORREKT) =====
  const t10_work = start + TEN_HOURS;
  const requiredPause10h = Math.max(60,pause);
  const t10_real = start + TEN_HOURS + requiredPause10h;

  // ===== ZEITEN =====
  const t5 = start + TARGET_5H58 + pause;
  const t8 = start + TARGET_8H12 + effectivePause;
  const t9 = start + TARGET_8H58 + effectivePause;

  // ===== PRIMARY =====
  let primary=t8;

  let out=[];

  out.push(`<div class="main">🟢 Feierabend: ${fmt(primary)}</div>`);

  out.push(`<div class="info">
    Arbeitszeit: ${Math.floor(currentWork/60)}h ${currentWork%60}min<br>
    Pause: ${pause||requiredPause} min
  </div>`);

  // ===== PAUSE STATUS =====
  if(pause===0){
    out.push(`<span class="info">ℹ️ ${requiredPause} min Pause automatisch angenommen</span>`);
  }
  else if(pause<requiredPause){
    out.push(`<span class="warn">⚠️ Pause zu kurz</span>`);
  }
  else{
    out.push(`<span class="ok">✅ Pause ok</span>`);
  }

  // ===== DETAILS =====
  out.push(`<details style="margin-top:10px;">
    <summary>Details</summary>
    5h58: ${fmt(t5)}<br>
    8h12: ${fmt(t8)}<br>
    8h58: ${fmt(t9)}<br>
    <hr>
    10h Arbeitszeit: ${fmt(t10_work)}<br>
    10h real (inkl Pause): ${fmt(t10_real)}
  </details>`);

  document.getElementById("status").innerHTML=out.join("<br>");

  if(notificationsEnabled){
    schedule(start,pause,effectivePause);
  }
}

// ===== SIMPLE SCHEDULER =====
function schedule(start,pause,effectivePause){
  clearTimers();

  const events=[
    start+TARGET_8H12+effectivePause,
    start+TEN_HOURS+requiredPause10h
  ];

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  events.forEach(e=>{
    const trigger=e-5;
    if(trigger>nowMin){
      const t=setTimeout(()=>{
        notify("Reminder","Event in 5 min");
      },(trigger-nowMin)*60000);
      timers.push(t);
    }
  });
}

</script>

</body>
</html>
