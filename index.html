<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Feierabend Rechner</title>

<style>
body{
  font-family:Arial;
  background:#667eea;
  display:flex;
  justify-content:center;
  padding:30px;
}

.card{
  width:520px;
  background:white;
  border-radius:16px;
  padding:24px;
}

h2{text-align:center;}

input[type=time]{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:10px;
}

.section{
  margin-top:16px;
  padding:12px;
  border-radius:10px;
  background:#f3f4f6;
}

.main{
  font-size:20px;
  text-align:center;
  margin:12px 0;
}

.ok{color:green;font-weight:bold;}
.warn{color:red;font-weight:bold;}
.info{color:#2563eb;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h2>⏰ Feierabend Rechner</h2>

<input type="time" id="start">

<div id="pausen"></div>
<button onclick="addPause()">Pause hinzufügen</button>

<div id="out"></div>
</div>

<script>

const TEN = 600;
const H58 = 358;
const H812 = 492;
const H858 = 538;

function min(t){
  let [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function fmt(m){
  return String(Math.floor(m/60)%24).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
}

function addPause(){
  let d=document.createElement("div");
  d.innerHTML=`
    <input type="time" class="ps">
    <input type="time" class="pe">
  `;
  document.getElementById("pausen").appendChild(d);
  d.querySelectorAll("input").forEach(i=>i.oninput=calc);
}

function calc(){

let s=document.getElementById("start").value;
if(!s) return;

let start=min(s);
let work=0,pause=0,last=start;

document.querySelectorAll(".ps").forEach((ps,i)=>{
  let pe=document.querySelectorAll(".pe")[i];
  if(ps.value && pe.value){
    let a=min(ps.value),b=min(pe.value);
    pause+=b-a;
    work+=a-last;
    last=b;
  }
});

let now=new Date();
let nowMin=now.getHours()*60+now.getMinutes();
if(nowMin>last) work+=nowMin-last;

// ===== PAUSENLOGIK =====
let required;

if(work>=540) required=60;
else if(work>=360) required=30;
else required=0;

let effective=Math.max(pause,required);

// ===== ZEITEN =====
let t5=start+H58+pause;
let t8=start+H812+effective;
let t9=start+H858+effective;

// ===== 10h korrekt =====
let t10=start+TEN;
let t10real=start+TEN+Math.max(pause,60);

// ===== OUTPUT =====
document.getElementById("out").innerHTML=`

<div class="main">🟢 Feierabend: ${fmt(t8)}</div>

<div class="section">
<b>Arbeitszeit:</b> ${Math.floor(work/60)}h ${work%60}min<br>
<b>Tatsächliche Pause:</b> ${pause} min<br>
<b>Automatisch angenommen:</b> ${required} min<br>
</div>

<div class="section ${pause<required?'warn':'ok'}">
${pause<required ? "⚠️ Pause unter Mindestwert" : "✅ Pause erfüllt"}
</div>

<div class="section">
<b>5h58:</b> ${fmt(t5)}<br>
<b>8h12:</b> ${fmt(t8)}<br>
<b>8h58:</b> ${fmt(t9)}<br>
<b>10h (Arbeitszeit):</b> ${fmt(t10)}<br>
<b>10h (real inkl Pause):</b> ${fmt(t10real)}
</div>

`;

}

document.getElementById("start").oninput=calc;

</script>

</body>
</html>
