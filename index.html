<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feierabend‑ & Pausenrechner</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  background:white;
  padding:32px;
  border-radius:20px;
  width:450px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2 {
  text-align:center;
  margin-bottom:18px;
}

.mode label {
  display:block;
  margin-bottom:6px;
  font-size:14px;
}

input[type=time] {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

button {
  width:100%;
  padding:14px;
  background:#667eea;
  border:none;
  border-radius:12px;
  color:white;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
}

.pause-group {
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
  position:relative;
}

.remove-btn {
  position:absolute;
  right:8px;
  top:8px;
  background:#dc2626;
  color:white;
  border:none;
  width:22px;
  height:22px;
  border-radius:50%;
  font-weight:bold;
  cursor:pointer;
}

#status {
  margin-top:18px;
  font-size:14px;
  line-height:1.55;
}

.ok   { color:#16a34a; font-weight:bold; }
.warn { color:#dc2626; font-weight:bold; }
.info { color:#2563eb; font-weight:bold; }
</style>
</head>

<body>
<div class="card">
<h2>⏰ Feierabend‑ & Pausenrechner</h2>

<div class="mode">
  <label><input type="radio" name="mode" value="short" checked>
    Feierabend &lt; 6 h (keine Pause nötig)</label>
  <label><input type="radio" name="mode" value="regular">
    Regelarbeitszeit 8 h 12 min</label>
</div>

<input type="time" id="startzeit">

<div id="pausenContainer"></div>
<button id="addPause">Pause hinzufügen</button>

<div id="status"></div>
</div>

<script>
// =======================
// ARBEITSRECHT‑KONSTANTEN
// =======================
const WORK_6H  = 360;   // Minuten
const WORK_9H  = 540;   // Minuten
const TARGET_5H59 = 359;
const TARGET_8H12 = 492;
const TARGET_8H59 = 539;

// =======================
// HILFSFUNKTIONEN
// =======================
function toMin(t){
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}
function fmt(m){
  return String(Math.floor(m/60)).padStart(2,"0") + ":" +
         String(m%60).padStart(2,"0");
}

// =======================
// PAUSEN‑HANDLING
// =======================
const pc = document.getElementById("pausenContainer");
document.getElementById("addPause").onclick = () => {
  const d = document.createElement("div");
  d.className = "pause-group";
  d.innerHTML = `
    <input type="time" class="ps"> –
    <input type="time" class="pe">
    <button class="remove-btn">−</button>
  `;
  d.querySelector(".remove-btn").onclick = () => { d.remove(); update(); };
  d.querySelectorAll("input").forEach(i => i.onchange = update);
  pc.appendChild(d);
};

document.querySelectorAll("input").forEach(i => i.onchange = update);

// =======================
// HAUPTLOGIK
// =======================
function update(){
  const s = document.getElementById("startzeit").value;
  if(!s) return;

  const mode = document.querySelector("input[name=mode]:checked").value;
  const start = toMin(s);

  let work = 0;
  let pause = 0;
  let last = start;

  document.querySelectorAll(".pause-group").forEach(p => {
    const ps = p.querySelector(".ps").value;
    const pe = p.querySelector(".pe").value;
    if(ps && pe){
      const a = toMin(ps);
      const b = toMin(pe);
      work  += a - last;
      pause += b - a;
      last = b;
    }
  });

  let out = [];

  // ===================
  // MODUS < 6h
  // ===================
  if(mode === "short"){
    out.push(
      `<span class="ok">
      ✅ Feierabend ab ${fmt(start + TARGET_5H59 + pause)}
      (keine Pause nötig)
      </span>`
    );
  }

  // ===================
  // MODUS 8h12
  // ===================
  if(mode === "regular"){

    // Pflichtpause (>6h → 30min)
    const requiredPause = 30;
    const effectivePause = Math.max(pause, requiredPause);

    const legalFeierabend = start + TARGET_8H12 + effectivePause;

    out.push(
      `<span class="ok">
      ✅ Frühester LEGALER Feierabend: ${fmt(legalFeierabend)}
      </span>`
    );

    out.push(
      pause >= requiredPause
      ? `<span class="ok">
         ✅ Pflichtpause erfüllt (aktuell: ${pause} min)
         </span>`
      : `<span class="warn">
         ⚠️ Pflichtpause ${requiredPause} min erforderlich
         (aktuell: ${pause} min)
         </span>`
    );

    // 8h59 / 9h‑Grenze rein nach ARBEITSZEIT
    const reach9h = start + WORK_9H + pause;
    const recommendedStamp = reach9h - 2; // 8h58 Empfehlung

    out.push(
      `<span class="info">
      ⏰ 9h reine Arbeitszeit wären theoretisch um ${fmt(reach9h)} erreicht
      </span>`
    );

    out.push(
      `<span class="warn">
      ✅ Stempel‑Empfehlung: spätestens um ${fmt(recommendedStamp)}<br>
      (Rundungsschutz – vermeidet automatische Zusatzpause)
      </span>`
    );
  }

  document.getElementById("status").innerHTML = out.join("<br>");
}
</script>

</body>
</html>
