<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feierabend‑ & Pausenrechner</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  background:white;
  padding:32px;
  border-radius:20px;
  width:480px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2 {
  text-align:center;
  margin-bottom:18px;
}

input[type=time] {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

button {
  width:100%;
  padding:14px;
  background:#667eea;
  border:none;
  border-radius:12px;
  color:white;
  margin-top:10px;
  font-size:14px;
  cursor:pointer;
}

.pause-group {
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
  position:relative;
}

.remove-btn {
  position:absolute;
  right:8px;
  top:8px;
  background:#dc2626;
  color:white;
  border:none;
  width:22px;
  height:22px;
  border-radius:50%;
  font-weight:bold;
  cursor:pointer;
}

#status {
  margin-top:18px;
  font-size:14px;
  line-height:1.6;
}

.ok   { color:#16a34a; font-weight:bold; }
.warn { color:#dc2626; font-weight:bold; }
.info { color:#2563eb; font-weight:bold; }
</style>
</head>

<body>
<div class="card">
<h2>⏰ Feierabend‑ & Pausenrechner</h2>

<input type="time" id="startzeit">

<div id="pausenContainer"></div>
<button id="addPause">Pause hinzufügen</button>

<div id="status"></div>
</div>

<script>
// ================= KONSTANTEN =================
const TARGET_5H58 = 358;   // Stempel nach <6h
const TARGET_8H12 = 492;   // Regelarbeitszeit
const TARGET_8H58 = 538;   // Rundungsschutz
const REQUIRED_PAUSE = 30;

// ================= HILFSFUNKTIONEN =================
function toMin(t){
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}
function fmt(m){
  return String(Math.floor(m/60)).padStart(2,"0") + ":" +
         String(m%60).padStart(2,"0");
}

// ================= PAUSEN =================
const pc = document.getElementById("pausenContainer");
document.getElementById("addPause").onclick = () => {
  const d=document.createElement("div");
  d.className="pause-group";
  d.innerHTML=`
    <input type="time" class="ps"> –
    <input type="time" class="pe">
    <button class="remove-btn">−</button>
  `;
  d.querySelector(".remove-btn").onclick=()=>{d.remove();update()};
  d.querySelectorAll("input").forEach(i=>i.onchange=update);
  pc.appendChild(d);
};

document.querySelectorAll("input").forEach(i=>i.onchange=update);

// ================= HAUPTLOGIK =================
function update(){
  const s=document.getElementById("startzeit").value;
  if(!s) return;

  const start=toMin(s);
  let work=0, pause=0, last=start;

  document.querySelectorAll(".pause-group").forEach(p=>{
    const ps=p.querySelector(".ps").value;
    const pe=p.querySelector(".pe").value;
    if(ps && pe){
      const a=toMin(ps), b=toMin(pe);
      work+=a-last;
      pause+=b-a;
      last=b;
    }
  });

  let out=[];

  // === AKTUELLE PAUSENZEIT ===
  out.push(`<span class="info">ℹ️ Aktuelle Gesamt‑Pause: ${pause} min</span>`);

  // === STEMPELN NACH 5H58 ===
  out.push(
    `<span class="ok">
     ✅ Stempeln nach 5h58 (ohne Pause): ${fmt(start + TARGET_5H58 + pause)}
     </span>`
  );

  // === STEMPELN NACH 8H12 (MIT PAUSE) ===
  const effectivePause = Math.max(pause, REQUIRED_PAUSE);
  out.push(
    `<span class="ok">
     ✅ Stempeln nach 8h12 (inkl. Pause): ${fmt(start + TARGET_8H12 + effectivePause)}
     </span>`
  );

  // === STEMPEL‑EMPFEHLUNG 8H58 ===
  out.push(
    `<span class="warn">
     ✅ Stempel‑Empfehlung 8h58: ${fmt(start + TARGET_8H58 + pause)}<br>
     (Rundungsschutz – verhindert Zusatzpause)
     </span>`
  );

  document.getElementById("status").innerHTML=out.join("<br>");
}
</script>

</body>
</html>
