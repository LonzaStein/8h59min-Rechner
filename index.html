<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feierabend‑ & Pausenrechner</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card {
  background:white;
  padding:32px;
  border-radius:20px;
  width:430px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2 { text-align:center; margin-bottom:18px; }

.mode label { display:block; margin-bottom:6px; }

input[type=time] {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:14px;
  background:#667eea;
  border:none;
  border-radius:12px;
  color:white;
  margin-top:10px;
}

.pause-group {
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
  position:relative;
}

.remove-btn {
  position:absolute;
  right:8px;
  top:8px;
  background:#dc2626;
  color:white;
  border:none;
  width:22px;
  height:22px;
  border-radius:50%;
  cursor:pointer;
}

#status {
  margin-top:18px;
  font-size:14px;
  line-height:1.5;
}

.ok   { color:#16a34a; font-weight:bold; }
.warn { color:#dc2626; font-weight:bold; }
.info { color:#2563eb; font-weight:bold; }
</style>
</head>

<body>
<div class="card">
<h2>⏰ Feierabend‑ & Pausenrechner</h2>

<div class="mode">
  <label><input type="radio" name="mode" value="short" checked> Feierabend &lt; 6h (keine Pause)</label>
  <label><input type="radio" name="mode" value="regular"> Regelarbeitszeit 8h12</label>
</div>

<input type="time" id="startzeit">

<div id="pausenContainer"></div>
<button id="addPause">Pause hinzufügen</button>

<div id="status"></div>
</div>

<script>
const WORK_6H  = 360;
const WORK_9H  = 540;
const TARGET_8H12 = 492;
const TARGET_8H59 = 539;
const TARGET_5H59 = 359;

function toMin(t){ const[h,m]=t.split(":").map(Number); return h*60+m; }
function fmt(m){ return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }

const pc = document.getElementById("pausenContainer");
document.getElementById("addPause").onclick = () => {
  const d=document.createElement("div");
  d.className="pause-group";
  d.innerHTML=`
    <input type="time" class="ps"> –
    <input type="time" class="pe">
    <button class="remove-btn">−</button>
  `;
  d.querySelector(".remove-btn").onclick=()=>{d.remove();update();}
  d.querySelectorAll("input").forEach(i=>i.onchange=update);
  pc.appendChild(d);
};

document.querySelectorAll("input").forEach(i=>i.onchange=update);

function update(){
  const s=document.getElementById("startzeit").value;
  if(!s) return;

  const mode=document.querySelector("input[name=mode]:checked").value;
  const start=toMin(s);

  let work=0, pause=0, last=start;
  document.querySelectorAll(".pause-group").forEach(p=>{
    const ps=p.querySelector(".ps").value;
    const pe=p.querySelector(".pe").value;
    if(ps&&pe){
      const a=toMin(ps), b=toMin(pe);
      work+=a-last; pause+=b-a; last=b;
    }
  });

  let out=[];

  if(mode==="short"){
    out.push(`<span class="ok">✅ Feierabend ab ${fmt(start+TARGET_5H59+pause)}</span>`);
  }

  if(mode==="regular"){
    let requiredPause = TARGET_8H12 > WORK_6H ? 30 : 0;
    let effectivePause = Math.max(pause, requiredPause);

    const legalFeierabend = start + TARGET_8H12 + effectivePause;
    out.push(`<span class="ok">✅ Frühester LEGALER Feierabend: ${fmt(legalFeierabend)}</span>`);

    out.push(
      pause >= requiredPause
      ? `<span class="ok">✅ Pflichtpause erfüllt (aktuell: ${pause} min)</span>`
      : `<span class="warn">⚠️ Pflichtpause ${requiredPause} min erforderlich (aktuell: ${pause} min)</span>`
    );

    const reach859 = start + TARGET_8H59 + pause;
    out.push(`<span class="warn">⏰ 8h59 reine Arbeitszeit um ${fmt(reach859)}</span>`);
    out.push(`<span class="info">👉 Empfehlung: spätestens bei 8h58 stempeln (Rundungsschutz)</span>`);
  }

  document.getElementById("status").innerHTML=out.join("<br>");
}
</script>
</body>
</html>
